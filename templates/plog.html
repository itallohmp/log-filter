<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PLog</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="body_plog">
  <header class="site_header">
    <img src="/static/img/logo.png" alt="Log Polito" class="logo">
    <ul>
      <li><a href="/index.html">Pagina Inicial</a></li>
    </ul>
  </header>

  <main>
    <div class="filtros">
      <label>Linhas por página:
        <select id="pageSize">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="200">200</option>
        </select>
      </label>

      <label>Protocolo:
        <input type="text" id="keyword" placeholder="TCP, UDP ...">
      </label>

      <label>IP (NAT):
        <input type="text" id="ip" placeholder="Ex: 177.137.21.38">
      </label>

      <label>Porta (NAT):
        <input type="text" id="porta" placeholder="Ex: 42857">
      </label>

      <label>Dia:
        <input type="date" id="day">
      </label>

      <label>Hora de:
        <input type="time" id="hour_from">
      </label>

      <label>até:
        <input type="time" id="hour_to">
      </label>

      <button id="btnBuscar" type="button">Buscar</button>
      <span id="status" aria-live="polite" style="margin-left:10px"></span>
    </div>

    <table id="tabelaLogs">
      <thead>
        <tr>
          <th>Data</th>
          <th>Protocolo</th>
          <th>Origem</th>
          <th>NAT</th>
          <th>Destino</th>
          <th>Destino Final</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="pagination"></div>
  </main>

  <footer id="rodape">
    <h3>©2025 Interativa Fibra & Energia Ltda.<span id="span_rodape"> Todos os direitos reservados. CNPJ 38.174.307/0001-81</span></h3>
    <img src="/static/img/logointerativa.png" alt="Logo Intertiva" class="logointerativa">
  </footer>

  <script src="/static/script.js"></script>
</body>
</html>
